<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Gestión de Productos</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#f0f6ff; --w:#fff; --c:#3fa9f5; --c2:#1a7fd4;
  --cl:#e0f0ff; --bd:#c8dff7; --tx:#1e2d3d; --mu:#7a95b0; --re:#e05b5b;
}

* { box-sizing:border-box; margin:0; padding:0; }

body { background:var(--bg); color:var(--tx); font-family:Nunito,sans-serif; padding:2rem 1rem 3rem; }

.wrap { max-width:860px; margin:0 auto; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:1.2rem; }
.full { grid-column:1/-1; overflow-x:auto; }
@media(max-width:620px) { .grid { grid-template-columns:1fr; } }

header { text-align:center; margin-bottom:2rem; }
h1 { font-size:clamp(1.5rem,4vw,2.1rem); font-weight:800; }
h1 span { color:var(--c); }
header p { font-size:.82rem; color:var(--mu); margin-top:.3rem; }

.card { background:var(--w); border:1.5px solid var(--bd); border-radius:12px; padding:1.4rem; box-shadow:0 2px 10px rgba(63,169,245,.07); }
.ttl  { font-size:.68rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--c); margin-bottom:.9rem; }

.field { margin-bottom:.8rem; }
label  { display:block; font-size:.7rem; font-weight:700; color:var(--mu); margin-bottom:.25rem; text-transform:uppercase; }
input  { width:100%; background:var(--bg); border:1.5px solid var(--bd); border-radius:8px; color:var(--tx); font-family:inherit; font-size:.9rem; padding:.5rem .8rem; outline:none; transition:border-color .2s,box-shadow .2s; }
input:focus { border-color:var(--c); box-shadow:0 0 0 3px rgba(63,169,245,.15); }

.row { display:flex; gap:.6rem; margin-top:.4rem; }
.btn { display:inline-flex; align-items:center; gap:.35rem; font-family:inherit; font-size:.84rem; font-weight:700; cursor:pointer; border:none; border-radius:8px; padding:.55rem 1.1rem; transition:opacity .15s,transform .1s; }
.btn:hover    { opacity:.88; }
.btn:active   { transform:scale(.97); }
.btn:disabled { opacity:.45; cursor:not-allowed; }
.p { background:var(--c); color:#fff; }
.s { background:var(--w); border:1.5px solid var(--bd); color:var(--mu); }

.resp { background:var(--cl); border:1.5px solid var(--bd); border-radius:8px; padding:.75rem; font-family:'Courier New',monospace; font-size:.73rem; color:var(--c2); min-height:58px; white-space:pre-wrap; word-break:break-word; line-height:1.6; margin-top:.9rem; }

.th { display:flex; justify-content:space-between; align-items:center; margin-bottom:.9rem; }
table { width:100%; border-collapse:collapse; font-size:.84rem; }
thead tr { background:var(--cl); border-bottom:2px solid var(--c); }
th { text-align:left; padding:.6rem .85rem; font-size:.66rem; font-weight:800; letter-spacing:.09em; text-transform:uppercase; color:var(--c2); }
tbody tr { border-bottom:1px solid var(--bd); transition:background .12s; }
tbody tr:hover { background:var(--cl); }
td { padding:.65rem .85rem; vertical-align:middle; }
td.pr { color:var(--c2); font-weight:700; }
.badge { background:var(--cl); color:var(--c2); border-radius:999px; padding:.12rem .55rem; font-size:.7rem; font-weight:700; }
.empty { text-align:center; padding:2rem; color:var(--mu); }
.del { background:none; border:1.5px solid #fcc; color:var(--re); border-radius:6px; padding:.22rem .55rem; font-size:.76rem; font-weight:700; cursor:pointer; font-family:inherit; transition:background .15s; }
.del:hover { background:#fff0f0; }

#toast { position:fixed; bottom:1.5rem; right:1.5rem; font-family:inherit; font-size:.82rem; font-weight:600; padding:.6rem 1rem; border-radius:10px; background:var(--c); color:#fff; opacity:0; transform:translateY(10px); transition:opacity .25s,transform .25s; pointer-events:none; z-index:999; box-shadow:0 4px 14px rgba(63,169,245,.3); }
#toast.show { opacity:1; transform:translateY(0); }
#toast.err  { background:var(--re); }

.dots::after { content:'.'; animation:dots 1.2s infinite; }
@keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Gestión de <span>Productos</span></h1>

  </header>

  <div class="grid">
    <div class="card">
      <div class="ttl">GET — Consultar</div>
      <div class="field"><label>ID (opcional)</label><input type="number" id="get-id" min="1"/></div>
      <div class="row"><button class="btn p" id="btn-get">▶ Ejecutar GET</button></div>
      <div class="resp" id="get-res"></div>
    </div>

    <div class="card">
      <div class="ttl">POST — Insertar</div>
      <div class="field"><label>Nombre *</label><input type="text" id="p-nombre"/></div>
      <div class="field"><label>Precio *</label><input type="number" id="p-precio" min="0" step="0.01"/></div>
      <div class="field"><label>Cantidad *</label><input type="number" id="p-cantidad" min="0"/></div>
      <div class="row">
        <button class="btn p" id="btn-post">▶ Enviar POST</button>
        <button class="btn s" id="btn-clear">✕ Limpiar</button>
      </div>
      <div class="resp" id="post-res"></div>
    </div>

    <div class="card full">
      <div class="th">
        <div class="ttl" style="margin-bottom:0">Productos</div>
        <button class="btn s" id="btn-ref" style="padding:.3rem .75rem;font-size:.74rem">⟳ Actualizar</button>
      </div>
      <table>
        <thead><tr><th>ID</th><th>Nombre</th><th>Precio</th><th>Cantidad</th><th>Registrado</th><th></th></tr></thead>
        <tbody id="tbody"><tr><td colspan="6" class="empty dots">Cargando productos</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API    = 'api.php';
const $      = id => document.getElementById(id);
const fields = ['p-nombre', 'p-precio', 'p-cantidad'];

function toast(msg, err = false) {
  const t = $('toast');
  t.textContent = msg;
  t.className   = 'show' + (err ? ' err' : '');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = '', 3000);
}

function fmt(d) {
  return d ? new Date(d).toLocaleString('es-SV', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '—';
}

function render(lista) {
  const tb = $('tbody');
  if (!lista?.length) { tb.innerHTML = '<tr><td colspan="6" class="empty">Sin productos</td></tr>'; return; }
  tb.innerHTML = lista.map(p => `<tr>
    <td><span class="badge">#${p.id}</span></td>
    <td>${p.nombre}</td>
    <td class="pr">$${parseFloat(p.precio).toFixed(2)}</td>
    <td>${p.cantidad}</td>
    <td>${fmt(p.creado_en)}</td>
    <td><button class="del" onclick="del(${p.id})">✕ Eliminar</button></td>
  </tr>`).join('');
}

async function req(url, opts = {}) {
  return (await fetch(url, opts)).json();
}

async function cargar() {
  $('tbody').innerHTML = '<tr><td colspan="6" class="empty dots">Cargando productos</td></tr>';
  try {
    const d = await req(API);
    d.error ? $('tbody').innerHTML = `<tr><td colspan="6" class="empty">${d.mensaje}</td></tr>` : render(d.data);
  } catch {
    $('tbody').innerHTML = '<tr><td colspan="6" class="empty">Sin conexión</td></tr>';
  }
}

async function del(id) {
  if (!confirm(`¿Eliminar producto #${id}?`)) return;
  try {
    const d = await req(`${API}?id=${id}`, { method: 'DELETE' });
    d.error ? toast(d.mensaje, true) : (toast('✓ Eliminado'), cargar());
  } catch {
    toast('Error de red', true);
  }
}

$('btn-get').onclick = async () => {
  const btn = $('btn-get'), box = $('get-res'), id = $('get-id').value.trim();
  btn.disabled    = true;
  box.textContent = 'Cargando…';
  try {
    const d = await req(id ? `${API}?id=${id}` : API);
    box.textContent = JSON.stringify(d, null, 2);
    d.error ? toast(d.mensaje, true) : (toast('✓ GET exitoso'), Array.isArray(d.data) && render(d.data));
  } catch(e) {
    box.textContent = 'Error: ' + e.message;
    toast('Error de red', true);
  } finally {
    btn.disabled = false;
  }
};

$('btn-post').onclick = async () => {
  const btn      = $('btn-post'), box = $('post-res');
  const nombre   = $('p-nombre').value.trim();
  const precio   = parseFloat($('p-precio').value);
  const cantidad = parseInt($('p-cantidad').value);
  if (!nombre)                         return toast('Nombre requerido', true);
  if (isNaN(precio)   || precio   < 0) return toast('Precio inválido', true);
  if (isNaN(cantidad) || cantidad < 0) return toast('Cantidad inválida', true);
  btn.disabled    = true;
  box.textContent = 'Enviando…';
  try {
    const d = await req(API, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({nombre, precio, cantidad}) });
    box.textContent = JSON.stringify(d, null, 2);
    d.error ? toast(d.mensaje, true) : (fields.forEach(f => $(f).value = ''), toast('✓ Producto creado'), cargar());
  } catch(e) {
    box.textContent = 'Error: ' + e.message;
    toast('Error de red', true);
  } finally {
    btn.disabled = false;
  }
};

$('btn-clear').onclick = () => { fields.forEach(f => $(f).value = ''); $('post-res').textContent = ''; };
$('btn-ref').onclick   = cargar;
cargar();
</script>
</body>
</html>
